<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #181818;
    --red: #c0392b;
    --red-bright: #e74c3c;
    --gold: #d4a017;
    --white: #f0ece4;
    --muted: #888;
    --border: #2a2a2a;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; font-weight: 300; line-height: 1.7; overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1rem 2.5rem;
    background: rgba(10,10,10,0.93);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.12em; color: var(--red-bright); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--white); }

  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.55) 50%, rgba(0,0,0,0.85) 100%);
  }
  .hero-content { position: relative; z-index: 2; }
  .hero-eyebrow { font-family: 'Special Elite', monospace; font-size: 0.85rem; letter-spacing: 0.25em; color: var(--red-bright); text-transform: uppercase; margin-bottom: 1.5rem; }
  .hero-names { font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem, 14vw, 11rem); line-height: 0.92; letter-spacing: 0.04em; color: var(--white); }
  .hero-names span { display: block; color: var(--red-bright); }
  .hero-amp { font-family: 'Special Elite', monospace; font-size: clamp(2rem, 5vw, 4rem); color: var(--gold); display: block; margin: 0.2em 0; }
  .hero-date { font-family: 'Special Elite', monospace; font-size: 1.1rem; letter-spacing: 0.2em; color: #ddd; margin-top: 2rem; }
  .hero-tagline { font-size: 0.9rem; color: #bbb; margin-top: 0.75rem; letter-spacing: 0.05em; }

  /* COUNTDOWN */
  .countdown-section { background: var(--red); padding: 2.5rem 2rem; text-align: center; }
  .countdown-label { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.75; margin-bottom: 1rem; }
  .countdown-grid { display: flex; justify-content: center; gap: 2.5rem; }
  .countdown-item { text-align: center; }
  .countdown-num { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; line-height: 1; display: block; }
  .countdown-unit { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.7; }

  /* SECTIONS */
  section { padding: 5rem 2rem; }
  .section-inner { max-width: 800px; margin: 0 auto; }
  .section-tag { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--red-bright); font-family: 'Special Elite', monospace; margin-bottom: 0.75rem; display: block; }
  h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 6vw, 4rem); letter-spacing: 0.06em; line-height: 1; color: var(--white); margin-bottom: 2rem; }
  p { color: #aaa; font-size: 1rem; margin-bottom: 1rem; }
  .divider { width: 60px; height: 2px; background: var(--red); margin: 1.5rem 0; }

  /* STORY */
  .story-section { background: var(--dark); }
  .story-block { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }
  .story-img { width: 100%; border: 2px solid var(--border); filter: grayscale(20%); }
  .story-text { font-family: 'Special Elite', monospace; font-size: 1rem; color: #bbb; line-height: 1.9; }
  .story-text p { color: #bbb; font-family: 'Special Elite', monospace; }

  .event-card:hover { border-left-color: var(--gold); }
  .event-num { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; line-height: 1; color: var(--border); margin-bottom: 0.5rem; }
  .event-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.06em; color: var(--white); margin-bottom: 0.5rem; }
  .event-date { font-family: 'Special Elite', monospace; font-size: 0.85rem; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 1rem; }
  .event-detail { font-size: 0.88rem; color: var(--muted); display: flex; align-items: flex-start; gap: 8px; margin-bottom: 0.4rem; }
  .event-detail::before { content: '—'; color: var(--red); flex-shrink: 0; }

  /* DRESSCODE */
  .dresscode-section { background: var(--black); }
  .dresscode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; margin-top: 2rem; }
  .dresscode-img { width: 100%; }
  .dresscode-items { display: flex; flex-direction: column; gap: 0.75rem; }
  .dresscode-item { display: flex; align-items: flex-start; gap: 10px; font-size: 0.92rem; color: #bbb; }
  .dresscode-item::before { content: '🤟'; flex-shrink: 0; }
  .dresscode-note { margin-top: 1.5rem; font-family: 'Special Elite', monospace; font-size: 0.85rem; color: var(--muted); border-left: 2px solid var(--red); padding-left: 1rem; }

  /* KIDS */
  .kids-section { background: var(--dark); }
  .kids-inner { max-width: 700px; }
  .kids-text { font-family: 'Special Elite', monospace; font-size: 1rem; color: #bbb; line-height: 1.9; }

  /* PROGRAM */
  .program-section { background: var(--black); }
  .timeline { margin-top: 2rem; }
  .timeline-item { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-time { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--red-bright); min-width: 70px; line-height: 1.2; }
  .timeline-content { flex: 1; }
  .timeline-name { font-weight: 500; font-size: 0.95rem; color: var(--white); margin-bottom: 0.2rem; }
  .timeline-desc { font-size: 0.85rem; color: var(--muted); margin: 0; }
  .timeline-day-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.15em; color: var(--gold); margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .program-day { margin-bottom: 3rem; }

  /* RSVP */
  .rsvp-section { background: var(--dark); }
  .rsvp-form { margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); font-family: 'Special Elite', monospace; }
  input, select, textarea { background: var(--card); border: 1px solid var(--border); color: var(--white); padding: 0.75rem 1rem; font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; border-radius: 0; -webkit-appearance: none; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--red-bright); }
  textarea { resize: vertical; min-height: 100px; }
  select option { background: var(--card); }
  .rsvp-btn { background: var(--red); color: var(--white); border: none; padding: 1rem 2.5rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.15em; cursor: pointer; align-self: flex-start; transition: background 0.2s, transform 0.1s; }
  .rsvp-btn:hover { background: var(--red-bright); }
  .rsvp-btn:active { transform: scale(0.98); }
  .rsvp-deadline { font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; }
  .success-msg { display: none; background: var(--card); border-left: 3px solid var(--gold); padding: 1.2rem 1.5rem; font-family: 'Special Elite', monospace; color: var(--gold); font-size: 0.95rem; margin-top: 1rem; }

  /* LOCATION */
  .location-section { background: var(--black); }
  .location-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
  .location-card { background: var(--card); border: 1px solid var(--border); padding: 1.75rem; }
  .location-icon { font-size: 1.5rem; margin-bottom: 1rem; }
  .location-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.06em; color: var(--white); margin-bottom: 0.25rem; }
  .location-sub { font-family: 'Special Elite', monospace; font-size: 0.8rem; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 1rem; }
  .location-address { font-size: 0.88rem; color: var(--muted); margin: 0; }
  .location-link { display: inline-block; margin-top: 0.75rem; font-size: 0.8rem; color: var(--red-bright); text-decoration: none; letter-spacing: 0.05em; }
  .location-link:hover { color: var(--white); }
